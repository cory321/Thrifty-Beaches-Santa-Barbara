<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — This rack is empty | Thrifty Beaches Santa Barbara</title>
    <meta name="description" content="The page you’re looking for isn’t on this rack. Head back to Thrifty Beaches Santa Barbara — hand-picked vintage on State Street.">
    <meta name="robots" content="noindex">

    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <meta name="theme-color" content="#1A1A1A">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'sand': '#F4F1EA',
                        'ocean': '#1A1A1A',
                        'sage': '#4F6B57',
                        'gold': '#C9A84C'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Gentle sway for the lonely hanger */
        .sway {
            transform-origin: 50% 8%;
            animation: sway 4.5s ease-in-out infinite;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50%      { transform: rotate(3deg); }
        }
        @media (prefers-reduced-motion: reduce) {
            .sway { animation: none; }
        }
    </style>
</head>
<body class="font-sans bg-sand text-ocean antialiased selection:bg-gold selection:text-white">

    <main class="hero-pattern min-h-[100dvh] flex flex-col items-center justify-center px-6 py-16 text-center">

        <a href="/" class="flex flex-col items-center font-serif font-bold text-xl md:text-2xl tracking-wide text-ocean leading-tight mb-12 fade-in-up">
            <span>THRIFTY BEACHES</span>
            <span class="font-sans text-[0.65rem] md:text-xs font-semibold tracking-[0.25em] text-sage uppercase mt-1">— Santa Barbara —</span>
        </a>

        <svg class="sway w-24 h-24 md:w-32 md:h-32 text-sage mb-8 fade-in-up delay-100" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

        </p>

        <div class="fade-in-up delay-300 flex flex-col sm:flex-row gap-4 justify-center w-full max-w-md sm:max-w-none">
            <a href="/" class="inline-flex items-center justify-center px-8 py-4 md:px-10 md:py-5 md:text-lg bg-ocean text-sand font-semibold rounded-full hover:bg-sage transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-ocean/20">

                See What’s New

        </div>

        <p class="mt-16 text-xs font-semibold tracking-[0.3em] uppercase text-ocean/50 fade-in-up delay-300">

</html>
